name: Issue Auto Assign & Create Branch

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write

jobs:
  auto:
    runs-on: ubuntu-latest
    steps:
      - name: Create branch based on label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const label = context.payload.label;
            const title = issue?.title ?? "";
            const issueNumber = issue?.number;

            if (!issueNumber) {
              core.setFailed("Missing issue number.");
              return;
            }

            // 허용된 타입 라벨인지 확인
            const allowed = new Set(["feat","fix","refactor","docs","chore","test","style"]);
            const labelName = label?.name?.toLowerCase() ?? "";

            if (!allowed.has(labelName)) {
              console.log(`ℹ️ Label "${label?.name}" is not a type label. Skipping.`);
              return;
            }

            const type = labelName;

            // Parse Linear issue ID from title (e.g., [TWI-123])
            const linearMatch = title.match(/\[?(TWI-\d+)\]?/);
            const linearId = linearMatch?.[1];

            const branchName = linearId
              ? `${type}/#${issueNumber}/${linearId}`
              : `${type}/#${issueNumber}`;
            console.log(`🌿 Target branch: ${branchName}`);

            // base branch SHA
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const baseBranch = 'develop';

            const { data: baseRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${baseBranch}`,
            });
            const oid = baseRef.object.sha;

            const issueId = issue.node_id;
            const mutation = `
              mutation($issueId: ID!, $oid: GitObjectID!, $name: String!) {
                createLinkedBranch(input: { issueId: $issueId, oid: $oid, name: $name }) {
                  linkedBranch { ref { name } }
                }
              }
            `;

            let linkedOk = false;

            for (let attempt = 1; attempt <= 2; attempt++) {
              try {
                const res = await github.graphql(mutation, { issueId, oid, name: branchName });
                console.log(`✅ Linked branch created: ${res.createLinkedBranch.linkedBranch.ref.name}`);
                linkedOk = true;
                break;
              } catch (e) {
                const msg = e?.message ?? String(e);
                console.warn(`⚠️ createLinkedBranch attempt ${attempt} failed: ${msg}`);

                if (msg.includes("already exists") || msg.includes("has already been taken")) {
                  console.log(`ℹ️ Branch already exists: ${branchName} (skip)`);
                  return;
                }
              }
            }

            if (linkedOk) return;

            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: oid,
              });
              console.log(`✅ Branch created (fallback): ${branchName} from ${baseBranch}@${oid}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`ℹ️ Branch already exists (fallback): ${branchName}`);
              } else {
                core.setFailed(`❌ Fallback createRef failed: ${e.message}`);
              }
            }